name: rayong-tracker
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12   # opensr-model requires Python >= 3.12
  - pip

  # ----- core scientific stack -----
  # Pin numpy<2 until torch + geospatial wheels finish their numpy 2 ABI work.
  - numpy<2
  - pandas
  - matplotlib
  - seaborn
  - tqdm
  - pyarrow
  - scikit-learn
  - scikit-image
  - imbalanced-learn
  - joblib

  # ----- geospatial (conda-forge gives a clean GDAL chain on Windows) -----
  - gdal
  - geopandas
  - shapely
  - pyproj
  - fiona
  - rasterio
  - rioxarray
  - xarray
  - dask
  - netcdf4

  # ----- notebook -----
  - jupyterlab
  - ipykernel
  - ipywidgets

  - pip:
      # CDSE / STAC clients
      - openeo
      - "openeo-processes-dask[implementations]"
      - pystac-client
      - planetary-computer

      # MGRS / Sentinel-2 tile helpers
      - mgrs

      # super-resolution + diffusion
      - opensr-model
      - opensr-test
      - sen2sr
      - omegaconf       # used to load the opensr-model 10 m config
      # transformers 4.47+ requires torch>=2.4. We pin torch to 2.3.1+cu121 to
      # dodge the fbgemm.dll WinError 127 issue, so cap transformers + diffusers
      # at versions that still support torch 2.3.
      - "diffusers<0.32"
      - "transformers<4.47"
      - "accelerate<1.2"
      - peft
      - safetensors

      # FID metric
      - torchmetrics[image]

      # ---------------------------------------------------------------
      # PyTorch with CUDA 12.1. The '+cu121' local-version tag only
      # exists on the PyTorch wheel index, so even though we list it as
      # --extra-index-url (pip's default ranks PyPI first), the resolver
      # is forced to pick the CUDA build — otherwise it silently falls
      # back to the CPU wheel on PyPI.
      #
      # Swap '+cu121' (and the index URL) for '+cu118' / '+cpu' if your
      # driver is different. See: https://pytorch.org/get-started/locally/
      # ---------------------------------------------------------------
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - "torch==2.3.1+cu121"
      - "torchvision==0.18.1+cu121"
      - "torchaudio==2.3.1+cu121"
