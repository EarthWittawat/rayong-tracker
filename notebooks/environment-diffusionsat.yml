name: synthcrop-dsat
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      - torch==2.2.2
      - torchvision==0.17.2
      - einops==0.7.0
      - accelerate==0.21.0
      - transformers==4.31.0
      - torchmetrics==1.2.1
      - pandas==2.0.3
      - rasterio==1.3.8
      - pyproj==3.6.0
      - shapely==2.0.2
      - webdataset==0.2.48
      - matplotlib
      - jupyterlab
      - wandb
      # DiffusionSat-side libs. Pins match Khanna et al. 2024 reference env.
      - diffusers==0.18.2
      - huggingface_hub==0.16.4
      - safetensors
      - numpy<2
      - pillow
      - tqdm
      - omegaconf
      # DiffusionSat itself is a GitHub repo, not a PyPI package. Clone it
      # next to this notebook folder, then point DSAT_REPO at the clone:
      #
      #   git clone https://github.com/samar-khanna/DiffusionSat.git notebooks/external/DiffusionSat
      #
      # Activate this env (`conda env create -f environment-diffusionsat.yml`)
      # and run `python notebooks/diffusionsat_synth.py` from the repo root.
